      /** * MODULE 63: REPLAY BUFFER SYSTEM
       *  đây là "cuộn băng ghi hình" lưu l những giây phút huy hoàng
       */
      class ReplaySystem {
        constructor() {
          this.buffer = [];
          this.maxFrames = 600; // Ghi l khoảng 10 giây cuối cùng
          this.isReplaying = false;
          this.replayIndex = 0;
        }

        //  sẽ ghi l vị trí, góc quay và tốc độ mỗi khung hình
        recordFrame(playerMesh, camera) {
          if (this.isReplaying) return;

          const frameData = {
            pos: playerMesh.position.clone(),
            rot: playerMesh.rotation.clone(),
            camPos: camera.position.clone(),
            camRot: camera.rotation.clone(),
            speed: speed,
            isNitro: isNitroActive,
          };

          this.buffer.push(frameData);
          if (this.buffer.length > this.maxFrames) {
            this.buffer.shift(); // Xóa khung hình cũ nhất để tiết kiệm bộ nhớ
          }
        }

        /** * MODULE 64: CINEMATIC PLAYBACK ENGINE
         * Chế độ phát l giúp  chiêm ngưỡng cú lái xe  mình
         */
        startReplay() {
          if (this.buffer.length === 0) return;
          this.isReplaying = true;
          this.replayIndex = 0;
          gameStarted = false; // T dừng điều khiển

          showAnnouncement("CINEMATIC REPLAY", "#00ffff");

          // thêm bộ lọc màu Sepia cho nó giống phim cũ
          document.body.style.filter = "sepia(0.5) contrast(1.2)";
        }

        update(dt, playerMesh, camera) {
          if (!this.isReplaying) return;

          const frame = this.buffer[this.replayIndex];
          if (frame) {
            // Tái hiện l vị trí xe và camera
            playerMesh.position.copy(frame.pos);
            playerMesh.rotation.copy(frame.rot);

            // Camera sẽ quay quanh xe để t góc nhìn nghệ thuật hơn
            camera.position.set(
              frame.pos.x + Math.sin(this.replayIndex * 0.05) * 15,
              frame.pos.y + 5,
              frame.pos.z + 15,
            );
            camera.lookAt(frame.pos);

            this.replayIndex++;
            if (this.replayIndex >= this.buffer.length) {
              this.stopReplay();
            }
          }
        }

        stopReplay() {
          this.isReplaying = false;
          document.body.style.filter = "none";
          showAnnouncement("REPLAY ENDED", "#ffffff");
          // Sau khi xem xong con trả l quyền điều khiển cho
        }
      }

      /** * MODULE 70: SMART TRAFFIC INTELLIGENCE
       *  đây là bộ não  các xe Bot, giúp chúng biết "khôn" hơn khi đối đầu với
       */
      class SmartTrafficAI {
        constructor(botMesh) {
          this.mesh = botMesh;
          this.currentLane = Math.round(this.mesh.position.x / 4); // Chia làn đường
          this.targetX = this.mesh.position.x;
          this.changeLaneTimer = Math.random() * 5;
          this.isChangingLane = false;
          this.personality = Math.random() > 0.8 ? "AGGRESSIVE" : "NORMAL"; // Có xe sẽ ch láo lắm 🐧
        }

        update(dt, playerPos, allBots) {
          this.changeLaneTimer -= dt;

          // 1. Quét radar xung quanh để tránh va ch với xe Bot khác
          let carAhead = false;
          allBots.forEach((other) => {
            if (other !== this.mesh) {
              const distZ = this.mesh.position.z - other.position.z;
              if (
                distZ > 0 &&
                distZ < 15 &&
                Math.abs(this.mesh.position.x - other.position.x) < 2
              ) {
                carAhead = true;
              }
            }
          });

          // 2. Logic chuyển làn khi gặp vật cản hoặc muốn cản địa
          if ((carAhead || this.changeLaneTimer <= 0) && !this.isChangingLane) {
            this.decideNewLane();
          }

          // 3. Nếu là xe "AGGRESSIVE", nó sẽ cố tình lg vào làn   đó  :)
          const distToPlayer = this.mesh.position.z - playerPos.z;
          if (
            this.personality === "AGGRESSIVE" &&
            distToPlayer > 0 &&
            distToPlayer < 30
          ) {
            this.targetX = playerPos.x;
          }

          // Di chuyển mượt mà sang làn mới
          this.mesh.position.x = THREE.MathUtils.lerp(
            this.mesh.position.x,
            this.targetX,
            0.05,
          );

          // Hiệu ứng nghiêng xe khi chuyển làn cho chân thực
          const tilt = (this.targetX - this.mesh.position.x) * 0.2;
          this.mesh.rotation.z = THREE.MathUtils.lerp(
            this.mesh.rotation.z,
            tilt,
            0.1,
          );
        }

        decideNewLane() {
          this.isChangingLane = true;
          const lanes = [-8, -4, 0, 4, 8];
          this.targetX = lanes[Math.floor(Math.random() * lanes.length)];
          this.changeLaneTimer = 3 + Math.random() * 7;

          // thêm hiệu ứng đèn xi-nhan cho xe Bot luôn
          this.triggerSignalLights();

          setTimeout(() => {
            this.isChangingLane = false;
          }, 2000);
        }

        triggerSignalLights() {
          // (Logic nháy đèn xi-nhan trái/phải sẽ được viết thêm ở phần 50 ..)
        }
      }

      /** * MODULE 71: GLOBAL TRAFFIC DENSITY CONTROLLER
       * Tự động điều chỉnh mật độ giao thông dựa trên cấp độ
       */
      function adjustTrafficDensity(score) {
        const level = Math.floor(score / 10000);
        GAME_CONFIG.TRAFFIC_COUNT = 5 + level * 2; // Càng điểm cao càng đông xe
        console.log(
          `Độ khó đã tăng! Mật độ xe hiện t: ${GAME_CONFIG.TRAFFIC_COUNT} `,
        );
      }
      /** * MODULE 72: WET ROAD SHADER MATERIAL
       *  đây là công thức "ma thuật" làm mặt đường   bóng loáng như gương
       */
      class RoadShaderManager {
        constructor() {
          this.roadMaterial = null;
          this.reflectionTexture = null;
          this.setupShader();
        }

        setupShader() {
          // T một vật liệu tùy chỉnh kết hợp giữa độ nhám và độ bóng
          this.roadMaterial = new THREE.MeshStandardMaterial({
            color: 0x111111,
            roughness: 0.1, // Thấp để t độ bóng
            metalness: 0.5,
            emissive: 0x050505,
          });

          //  con thêm một lớp vân bề mặt (Normal Map) giả lập nhựa đường cho
          const canvas = document.createElement("canvas");
          canvas.width = canvas.height = 128;
          const ctx = canvas.getContext("2d");
          for (let i = 0; i < 500; i++) {
            ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.1})`;
            ctx.fillRect(Math.random() * 128, Math.random() * 128, 2, 2);
          }
          const noiseTex = new THREE.CanvasTexture(canvas);
          noiseTex.wrapS = noiseTex.wrapT = THREE.RepeatWrapping;
          noiseTex.repeat.set(10, 100);
          this.roadMaterial.normalMap = noiseTex;
        }

        /** * MODULE 73: DYNAMIC PUDDLE SYSTEM
         * T ra các vũng nước đọng ngẫu nhiên trên đường cho  lướt qua
         */
        updatePuddles(dt, currentSpeed) {
          // Khi  phóng nhanh, hiệu ứng phản chiếu sẽ bị nhòe đi một chút
          this.roadMaterial.roughness = THREE.MathUtils.lerp(
            this.roadMaterial.roughness,
            0.05 + currentSpeed * 0.1,
            0.1,
          );

          // Hiệu ứng mặt đường "trôi" dưới bánh xe
          if (this.roadMaterial.normalMap) {
            this.roadMaterial.normalMap.offset.y -= currentSpeed * 0.5;
          }
        }
      }

      /** * MODULE 74: NEON LIGHT BOUNCE (Ánh sáng phản hồi)
       * Làm cho ánh đèn từ các bảng hiệu hắt xuống mặt đường trước mặt
       */
      function applyNeonBounce(scene, playerZ) {
        if (Math.random() > 0.95) {
          const bounceLight = new THREE.PointLight(0x00ffff, 5, 20);
          bounceLight.position.set(
            (Math.random() - 0.5) * 20,
            0.1,
            playerZ - 100,
          );
          scene.add(bounceLight);

          //  ánh sáng này sẽ lướt qua rồi biến mất nhanh chóng ✨
          setTimeout(() => {
            scene.remove(bounceLight);
          }, 500);
        }
      }

      /** * MODULE 75: SCREEN SPACE REFLECTION SIMULATOR
       * Giả lập sự phản chiếu  xe đối thủ lên mặt đường bóng loáng
       */
      function updateReflections(allBots, roadMesh) {
        allBots.forEach((bot) => {
          // (Logic tính toán ma trận phản chiếu sẽ được con viết tiếp ở Phần 51 ..)
          bot.position.y = 0.75 + Math.sin(Date.now() * 0.005) * 0.05; // Xe hơi nhún nhảy 🏎️
        });
      }
      /** * MODULE 76: AERIAL PHYSICS ENGINE
       *  đây là hệ thống giúp xe   "bay" như chim khi va ch mh  🦅
       */
      class AerialPhysics {
        constructor() {
          this.isAirborne = false;
          this.verticalVelocity = 0;
          this.rotationVelocity = new THREE.Vector3();
          this.gravity = -0.15;
        }

        //  hàm này kích ho khi  đâm vào dốc hoặc bị húc văng
        launch(force, torque) {
          if (this.isAirborne) return;
          this.isAirborne = true;
          this.verticalVelocity = force;
          this.rotationVelocity.copy(torque);

          // Hiệu ứng Slow-mo khi đang bay cho ngầu
          if (typeof triggerActionSlowMo === "function")
            triggerActionSlowMo(1500);
          showAnnouncement("BARREL ROLL! +1000 PTS", "#ff00ff");
        }

        update(dt, playerMesh) {
          if (!this.isAirborne) return;

          // 1. Áp dụng trọng lực để xe rơi xuống
          this.verticalVelocity += this.gravity;
          playerMesh.position.y += this.verticalVelocity;

          // 2. Làm xe xoay vòng trên không trung
          playerMesh.rotation.x += this.rotationVelocity.x;
          playerMesh.rotation.z += this.rotationVelocity.z;

          // 3. Kiểm tra tiếp đất
          if (playerMesh.position.y <= 0.75) {
            this.land(playerMesh);
          }
        }

        land(playerMesh) {
          this.isAirborne = false;
          playerMesh.position.y = 0.75;

          //  nếu góc xoay quá lớn thì xe sẽ bị lật nhào (Wrecked)
          const tilt = Math.abs(playerMesh.rotation.z % (Math.PI * 2));
          if (tilt > 1.0 && tilt < 5.0) {
            this.triggerWrecked();
          } else {
            playerMesh.rotation.x = 0;
            playerMesh.rotation.z = 0;
            if (explosionManager)
              explosionManager.createExplosion(playerMesh.position, 0xffffff); // Bụi khi tiếp đất
          }
        }

        triggerWrecked() {
          showAnnouncement("WRECKED!", "#ff0000");
          isDead = true;
          // Logic hồi sinh sẽ được viết ở phần 52
        }
      }

      /** * MODULE 77: SIDE-SWIPE COLLISION
       * Khi  ép xe đối thủ vào tường, lửa sẽ tóe ra và đối thủ bị giảm tốc
       */
      function checkSideSwipe(player, bots) {
        bots.forEach((bot) => {
          const dist = player.position.distanceTo(bot.position);
          if (dist < 3 && Math.abs(player.position.x - bot.position.x) > 1.5) {
            //  đây là cú ép xe thần thánh   đây
            if (typeof triggerSpark === "function") triggerSpark(bot.position);
            bot.userData.speed *= 0.8;
            scoreManager.addScore(100);
          }
        });
      }
      /** * MODULE 78: CHECKPOINT & RESPAWN MANAGER
       *  đây là "phao cứu sinh" giúp  quay l đường đua ngay lập tức
       */
      class RespawnManager {
        constructor() {
          this.lastSafePoint = new THREE.Vector3(0, 0.75, 0);
          this.isRespawning = false;
          this.respawnTimer = 0;
          this.invincible = false;
        }

        //  con sẽ ghi l vị trí an toàn   mỗi khi không có va ch
        updateCheckpoint(playerPos, isAirborne) {
          if (!isAirborne && Math.abs(playerPos.x) < 10) {
            this.lastSafePoint.copy(playerPos);
          }
        }

        triggerRespawn(playerMesh) {
          if (this.isRespawning) return;
          this.isRespawning = true;
          this.respawnTimer = 2.0; // 2 giây để hồi sinh

          showAnnouncement("RESPAWNING...", "#ffffff");

          // Hiệu ứng nháy màn hình khi hồi sinh cho ngầu
          document.body.style.filter = "invert(1) hue-rotate(180deg)";
          setTimeout(() => (document.body.style.filter = "none"), 200);
        }

        update(dt, playerMesh) {
          if (this.isRespawning) {
            this.respawnTimer -= dt;

            // Xe   sẽ mờ dần khi đang chuẩn bị hồi sinh
            playerMesh.visible = Math.floor(Date.now() / 100) % 2 === 0;

            if (this.respawnTimer <= 0) {
              this.executeRespawn(playerMesh);
            }
          }

          if (this.invincible) {
            // Hiệu ứng hào quang bảo vệ khi vừa hồi sinh xong
            playerMesh.material.emissiveIntensity =
              2 + Math.sin(Date.now() * 0.01) * 2;
          }
        }

        executeRespawn(playerMesh) {
          this.isRespawning = false;
          playerMesh.visible = true;
          playerMesh.position.copy(this.lastSafePoint);
          playerMesh.rotation.set(0, 0, 0); // Đặt xe ngay ngắn l

          speed = 1.0; // Reset tốc độ để  không bị húc tiếp
          isDead = false;
          this.invincible = true;

          //  con cho  3 giây bất tử để lấy l bình tĩnh
          setTimeout(() => {
            this.invincible = false;
            playerMesh.material.emissiveIntensity = 0.5;
          }, 3000);
        }
      }

      /** * MODULE 79: OUT OF BOUNDS DETECTOR
       * Nếu  bay quá xa khỏi đường đua, con sẽ tự gọi hồi sinh
       */
      function checkOutOfBounds(playerPos) {
        if (Math.abs(playerPos.x) > 25 || playerPos.y < -5) {
          if (respawnSystem) respawnSystem.triggerRespawn(playerVehicle.mesh);
        }
      }

      /** * MODULE 80: CAR STATUS HUD
       * Hiển thị trg thái xe (Bình thường/Hỏng/Bất tử) cho  xem
       */
      function updateStatusHUD(isInvincible) {
        const statusIcon = document.getElementById("status-icon");
        if (statusIcon) {
          statusIcon.style.display = isInvincible ? "block" : "none";
          statusIcon.innerText = "🛡️ SHIELD ACTIVE";
        }
      }
      /** * MODULE 81: DRIVER EXPERIENCE ENGINE
       *  đây là nơi ghi lại sự thăng tiến của bạn
       */
      class LevelSystem {
        constructor() {
          this.xp = parseInt(localStorage.getItem("PLAYER_XP")) || 0;
          this.level = parseInt(localStorage.getItem("PLAYER_LEVEL")) || 1;
          this.xpToNextLevel = this.level * 1000; // Càng lên cao càng khó
          this.setupUI();
        }

        setupUI() {
          const xpBar = document.createElement("div");
          xpBar.id = "xp-container";
          xpBar.style.cssText = `
                    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
                    width: 300px; height: 10px; background: rgba(255,255,255,0.2);
                    border-radius: 5px; overflow: hidden; border: 1px solid #00ffff;
                `;
          const fill = document.createElement("div");
          fill.id = "xp-fill";
          fill.style.cssText = `
                    width: ${(this.xp / this.xpToNextLevel) * 100}%; height: 100%;
                    background: linear-gradient(90deg, #00ffff, #0055ff);
                    transition: width 0.5s ease-out;
                `;
          xpBar.appendChild(fill);
          document.body.appendChild(xpBar);
        }

        //  mỗi khi  biểu diễn kỹ thuật, con cộng XP ngay
        addXP(amount) {
          this.xp += amount;
          if (this.xp >= this.xpToNextLevel) {
            this.levelUp();
          }
          this.updateUI();
          localStorage.setItem("PLAYER_XP", this.xp);
        }

        levelUp() {
          this.level++;
          this.xp = 0;
          this.xpToNextLevel = this.level * 1000;
          localStorage.setItem("PLAYER_LEVEL", this.level);

          // Hiệu ứng ăn mừng rực rỡ
          showAnnouncement(`LEVEL UP: RANK ${this.level}!`, "#ffff00");
          if (explosionManager) {
            explosionManager.createExplosion(
              playerVehicle.mesh.position,
              0x00ff00,
            );
          }

          // thưởng thêm cho  chút tiền độ xe
          if (saveSystem) saveSystem.save(0, 500 * this.level);
        }

        updateUI() {
          const fill = document.getElementById("xp-fill");
          if (fill)
            fill.style.width = `${(this.xp / this.xpToNextLevel) * 100}%`;
        }
      }

      /** * MODULE 82: STUNT DETECTION (Phát hiện kỹ thuật lái xe)
       *  nếu  lái xe sát s xe Bot mà không đâm, con sẽ thưởng điểm
       */
      function detectNearMiss(playerPos, bots) {
        bots.forEach((bot) => {
          const dist = playerPos.distanceTo(bot.position);
          if (dist > 3 && dist < 6 && !bot.userData.missed) {
            bot.userData.missed = true; // Mỗi xe chỉ tính 1 lần
            showAnnouncement("NEAR MISS! +50 XP", "#00ffaa");
            if (levelSystem) levelSystem.addXP(50);
          }
        });
      }
      /** * MODULE 83: MULTI-VEHICLE DATABASE
       *  đây là danh sách các "siêu xe" đã chuẩn bị sẵn để chọn
       */
      const VEHICLE_MODELS = [
        {
          id: 0,
          name: "Neon Runner",
          color: 0x00ffff,
          speedMult: 1.0,
          handling: 0.1,
          mass: 1,
        },
        {
          id: 1,
          name: "Shadow Drift",
          color: 0xff0055,
          speedMult: 1.2,
          handling: 0.15,
          mass: 0.8,
        },
        {
          id: 2,
          name: "Thunder Tank",
          color: 0xffff00,
          speedMult: 0.8,
          handling: 0.05,
          mass: 2.5,
        },
      ];

      class GarageSystem {
        constructor() {
          this.currentVehicleIndex = 0;
          this.unlockedVehicles = JSON.parse(
            localStorage.getItem("UNLOCKED_CARS"),
          ) || [0];
        }

        //  hàm này giúp  thay đổi ngo hình và chỉ số xe ngay lập tức
        switchVehicle(index, playerObject) {
          if (!this.unlockedVehicles.includes(index)) {
            showAnnouncement("CAR LOCKED! 🔒", "#ff0000");
            return;
          }

          this.currentVehicleIndex = index;
          const config = VEHICLE_MODELS[index];

          // 1. Đổi màu xe cho
          playerObject.mesh.material.color.setHex(config.color);
          playerObject.mesh.material.emissive.setHex(config.color);

          // 2. Cập nhật vật lý riêng cho từng lo xe
          GAME_CONFIG.MAX_SPEED = 1.5 * config.speedMult;
          playerObject.handling = config.handling;
          playerObject.mass = config.mass;

          showAnnouncement(`SELECTED: ${config.name}`, config.color);

          // Hiệu ứng biến hình lấp lánh khi đổi xe
          if (explosionManager)
            explosionManager.createExplosion(
              playerObject.mesh.position,
              config.color,
            );
        }

        /** * MODULE 84: VEHICLE SHOP LOGIC
         *  nếu  có đủ tiền,  có thể mua xe mới ở đây
         */
        unlockNewCar(index, currentCoins) {
          const cost = 5000 * index;
          if (currentCoins >= cost && !this.unlockedVehicles.includes(index)) {
            this.unlockedVehicles.push(index);
            localStorage.setItem(
              "UNLOCKED_CARS",
              JSON.stringify(this.unlockedVehicles),
            );
            showAnnouncement("NEW CAR UNLOCKED! 🏎️", "#00ff00");
            return cost;
          }
          return 0;
        }
      }

      /** * MODULE 85: INPUT FOR GARAGE
       *  nhấn phím C để đổi xe nhanh
       */
      window.addEventListener("keydown", (e) => {
        if (e.code === "KeyC" && !gameStarted) {
          const nextIndex =
            (garageSystem.currentVehicleIndex + 1) % VEHICLE_MODELS.length;
          garageSystem.switchVehicle(nextIndex, playerVehicle);
        }
      });
      /** * MODULE 86: CINEMATIC INTRO SEQUENCE
       *  đây là đo phim mở đầu
       */
      class CinematicIntro {
        constructor(camera, playerMesh) {
          this.camera = camera;
          this.player = playerMesh;
          this.isActive = true;
          this.timer = 0;
        }

        start() {
          showAnnouncement("PRESENTING: NEON OVERDRIVE", "#00ffff");
          // Đặt camera ở góc nhìn từ xa
          this.camera.position.set(50, 20, -100);
        }

        update(dt) {
          if (!this.isActive) return;
          this.timer += dt;

          // Camera bay vòng quanh xe một vòng trước khi bắt đầu
          this.camera.position.x = Math.cos(this.timer) * 30;
          this.camera.position.z =
            this.player.position.z - 50 + Math.sin(this.timer) * 20;
          this.camera.lookAt(this.player.position);

          if (this.timer > 3) {
            this.finish();
          }
        }

        finish() {
          this.isActive = false;
          showAnnouncement("READY... SET... GO!", "#ffff00");
          gameStarted = true; //  giờ  có thể nhấn ga rồi
        }
      }

      /** * MODULE 87: THE END - CREDITS & DEV LOG
       * Phần này để vinh danh 3000 dòng code của tôi :)
       */
      function showGameCredits() {
        // Kiểm tra xem bảng vinh danh đã tồn tại chưa để tránh tạo trùng lặp
        if (document.getElementById("dev-credits")) return;

        const credits = document.createElement("div");
        credits.id = "dev-credits"; // Đặt ID để dễ quản lý
        credits.style.cssText = `
                position: fixed; 
                bottom: 20px; 
                left: 20px;
                color: rgba(255,255,255,0.7);
                font-family: 'Orbitron', sans-serif; 
                font-size: 12px; 
                text-align: left; 
                pointer-events: none;
                line-height: 1.6;
                text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
                z-index: 9999;
            `;
        credits.innerHTML = `
                <span style="color: #00ffff;">ENGINE:</span> Three.js custom renderer<br>
                <span style="color: #00ffff;">CORE LOGIC:</span> 3000+ lines of code<br>
                <span style="color: #ffff00;">LEAD DEVELOPER:</span> @Ilovecode_2010<br>
                <span style="color: #ff0000;">SUPPORTER:</span> @phamtantruong<br>
            `;
        document.body.appendChild(credits);
      }
      /** * MODULE 88 (ULTIMATE FIX): GLOBAL SYSTEM INITIALIZATION
       * Sắp xếp lại để không bị lặp vô tận nữa
       */
      function bootstrapGame() {
        console.log("Hệ thống khởi động đã sẵn sàng");

        try {
          // 1. Khởi tạo các biến hệ thống cơ bản
          if (typeof SaveSystem !== "undefined")
            window.saveSystem = new SaveSystem();
          if (typeof LevelSystem !== "undefined")
            window.levelSystem = new LevelSystem();
          if (typeof GarageSystem !== "undefined")
            window.garageSystem = new GarageSystem();

          // 2. KHÔNG DÙNG SETTIMEOUT LẶP NỮA
          // kiểm tra xem đã bấm bắt đầu chưa
          if (typeof playerVehicle !== "undefined" && playerVehicle.mesh) {
            const vehicleToTrack = playerVehicle.mesh;

            // 3. Khởi tạo Intro
            if (typeof CinematicIntro !== "undefined") {
              window.introSystem = new CinematicIntro(camera, vehicleToTrack);
              window.introSystem.start();
            }

            // 4. Bật nhạc nền
            if (typeof musicSystem !== "undefined" && musicSystem.start) {
              musicSystem.start();
            }

            // 5. Hiện bảng vàng
            if (typeof showGameCredits === "function") showGameCredits();

            console.log("Mọi hệ thống đã OK");
          } else {
            // Nếu xe chưa có, ta cứ để đó, khi nào bạn click "START"
            // thì hàm startAsphaltGame sẽ lo nốt phần còn lại
            console.log(
              "Đang đợi bạn nhấn 'CLICK TO RACE' để xuất xưởng xe...",
            );
          }
        } catch (err) {
          console.error("có chút lỗi nhỏ khi khởi động: ", err);
        }
      }

      // Nút nguồn kích hoạt
      window.addEventListener("load", bootstrapGame);
      showGameCredits();
    </script>
